    <style>
        :root {
            --primary: #1b5e20;
            --primary-light: #2e7d32;
            --primary-dark: #0d3b10;
            --accent: #f9a825;
            --accent-hover: #f57f17;
            --bg: #f5f7f4;
            --card: #ffffff;
            --text: #1a1a1a;
            --text-light: #666;
            --border: #e0e0e0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--bg) 0%, #e8f5e9 100%);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        h1 {
            text-align: center;
            color: var(--primary-dark);
            margin-bottom: 30px;
            font-family: 'Playfair Display', serif;
            font-size: 2.8rem;
            position: relative;
            display: inline-block;
        }

        h1::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 3px;
            background: var(--accent);
            border-radius: 2px;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-bottom: 20px;
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
            font-size: 1.1rem;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        .cart-summary {
            position: fixed;
            top: 20px;
            right: 20px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            padding: 15px 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            z-index: 100;
            cursor: pointer;
            transition: all 0.3s;
        }

        .cart-summary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.25);
        }

        .cart-summary i {
            font-size: 1.5rem;
        }

        .cart-count {
            background: var(--accent);
            color: var(--primary-dark);
            border-radius: 50%;
            padding: 2px 8px;
            margin-left: 10px;
            font-weight: bold;
        }

        .product-qty-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: var(--accent);
            color: var(--primary-dark);
            border-radius: 50%;
            padding: 5px 10px;
            font-weight: bold;
            font-size: 0.9rem;
            min-width: 25px;
            text-align: center;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }

        .product-card {
            background: var(--card);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
            transition: all 0.3s;
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(0,0,0,0.03);
        }

        .product-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.12);
        }

        .product-image {
            height: 180px;
            background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .product-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s;
        }

        .product-card:hover .product-image img {
            transform: scale(1.05);
        }

        .product-image-placeholder {
            font-size: 3rem;
            color: var(--primary);
        }

        .product-info {
            padding: 20px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .product-category {
            color: var(--primary);
            font-size: 0.85rem;
            text-transform: uppercase;
            margin-bottom: 5px;
            font-weight: 600;
        }

        .product-name {
            font-size: 1.2rem;
            margin-bottom: 10px;
            color: var(--text);
            font-weight: 600;
        }

        .product-description {
            font-size: 0.95rem;
            color: var(--text-light);
            margin-bottom: 15px;
            flex-grow: 1;
            line-height: 1.5;
        }

        .product-price {
            font-size: 1.3rem;
            font-weight: bold;
            color: var(--primary);
            margin-bottom: 10px;
        }

        .product-unit {
            font-size: 0.9rem;
            color: var(--text-light);
            margin-bottom: 15px;
        }

        .stock-status {
            font-size: 0.9rem;
            margin-bottom: 15px;
            font-weight: 500;
        }

        .in-stock {
            color: #2e7d32;
        }

        .out-stock {
            color: #c62828;
        }

        .add-cart-btn {

            padding: 12px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;

        .add-cart-btn:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
        }

        .add-cart-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .category-section {

            color: var(--primary);
            border-bottom: 2px solid var(--accent);
            padding-bottom: 10px;
            margin-bottom: 25px;
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;

        .loading {
            text-align: center;
            padding: 50px;
            font-size: 1.2rem;
            color: var(--text-light);
        }

        .error {
            text-align: center;
            padding: 50px;
            color: #c62828;

        .cart-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .cart-modal.active {
            display: flex;
        }

        .cart-content {
            background: white;
            margin: 50px auto;
            padding: 30px;
            border-radius: 20px;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
            width: 90%;

        .cart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;

        .cart-item {

            border-bottom: 1px solid var(--border);

            border-radius: 10px;

        }

            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text-light);

</head>

        // Update cart count
        function updateCartCount() {
            document.getElementById('cartCount').textContent = cart.reduce((sum, item) => sum + item.qty, 0);
        }

        // Update product quantity display on card
        function updateProductQtyDisplay(productId, qty) {
            const badge = document.getElementById('qty-' + productId);
            if (badge) {
                badge.textContent = qty;
                badge.style.display = qty > 0 ? 'block' : 'none';
            }
        }

        // Add to cart
        function addToCart(product) {
            const existing = cart.find(item => item.id === product.id);
            if (existing) {
                existing.qty += 1;
            } else {
                cart.push({ ...product, qty: 1 });
            }
            localStorage.setItem('cart', JSON.stringify(cart));
            updateCartCount();
            updateProductQtyDisplay(product.id, cart.find(item => item.id === product.id)?.qty || 1);
            alert(product.name + ' added to cart!');
        }

        // Open cart modal
        function openCart() {
            const modal = document.getElementById('cartModal');
            const itemsContainer = document.getElementById('cartItems');
            const totalContainer = document.getElementById('cartTotal');
            
            if (cart.length === 0) {
                itemsContainer.innerHTML = '<p>Your cart is empty</p>';
                totalContainer.textContent = '';
            } else {
                let total = 0;
                itemsContainer.innerHTML = cart.map(item => {
                    const itemTotal = item.price * item.qty;
                    total += itemTotal;
                    return `
                        <div class="cart-item">
                            <div style="display: flex; align-items: center; gap: 10px;">
                                <div style="width: 50px; height: 50px; background: #e8f5e9; display: flex; align-items: center; justify-content: center; border-radius: 5px;">
                                    <i class="fas ${item.icon}" style="color: #1b5e20;"></i>
                                </div>
                                <div>
                                    <div>${item.name}</div>
                                    <div style="font-size: 0.9rem; color: #666;">KES ${item.price} x ${item.qty}</div>
                                </div>
                            </div>
                            <div>KES ${itemTotal}</div>
                        </div>
                    `;
                }).join('');
                totalContainer.textContent = 'Total: KES ' + total;
            }
            modal.style.display = 'block';
        }

        // Close cart modal
        function closeCart() {
            document.getElementById('cartModal').style.display = 'none';
        }

        }

        // Category display name mapping
        const CATEGORY_LABELS = {
            vegetable:   'Vegetable Seedlings',
            fruit:       'Fruit Tree Seedlings',
            tree:        'Tree Seedlings',
        };

        function getCategoryLabel(cat) {
            return CATEGORY_LABELS[cat] || cat.charAt(0).toUpperCase() + cat.slice(1);
        }

        // Render products grouped by category
        function renderProducts() {
            const container = document.getElementById('productsContainer');

            // Group products by category
            const categories = {};
            products.forEach(product => {
                if (!categories[product.category]) {
                    categories[product.category] = [];
                }
                categories[product.category].push(product);
            });

            // Build HTML
            let html = '';
            for (const [category, items] of Object.entries(categories)) {
                html += `
                    <div class="category-section">
                        <h2 class="category-title">${getCategoryLabel(category)}</h2>
                        <div class="products-grid">
                    `;

                items.forEach(product => {
                    const stockStatus = product.inStock ?
                        '<span class="stock-status in-stock"><i class="fas fa-check"></i> In Stock</span>' :
                        '<span class="stock-status out-stock"><i class="fas fa-times"></i> Out of Stock</span>';

                    html += `
                        <div class="product-card">
                            <div class="product-image">
                                <span class="product-qty-badge" id="qty-${product.id}" style="display: none;">0</span>
                                ${product.image ?
                                    `<img src="${product.image}" alt="${product.name}">` :
                                    `<div class="product-image-placeholder"><i class="fas ${product.icon}"></i></div>`
                                }
                            </div>
                            <div class="product-info">
                                <div class="product-category">${getCategoryLabel(product.category)}</div>
                                <div class="product-name">${product.name}</div>
                                <div class="product-description">${product.description || ''}</div>
                                <div class="product-unit">Unit: ${product.unit || 'seedling'}</div>
                                ${stockStatus}
                                <div class="product-price">KES ${product.price}</div>
                                <button class="add-cart-btn" onclick="addToCart(${JSON.stringify(product).replace(/"/g, '&quot;')})" ${!product.inStock ? 'disabled' : ''}>
                                    <i class="fas fa-shopping-cart"></i> Add to Cart
                                </button>
                            </div>
                        </div>
                    `;
                });
                
                html += '</div></div>';
            }
            
            container.innerHTML = html;
        }

        // Initialize
        updateCartCount();
        renderProducts();
        // Show existing cart quantities on product cards
        cart.forEach(item => updateProductQtyDisplay(item.id, item.qty));
    </script>
</body>
</html>
